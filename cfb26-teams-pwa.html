// ── SCORING ENGINE ────────────────────────────────────────────────────────────
function getBlitz(f, flat) {
  let p = f.blitzBase;
  for (const m of f.blitzMods) {
    if (m.tags.some(t => flat.includes(t))) p = Math.max(5, Math.min(50, p + m.d));
  }
  return Math.round(p);
}

function blitzInfo(pct) {
  if (pct <= 10) return { label: "Very Conservative", color: "#406050" };
  if (pct <= 20) return { label: "Conservative",      color: "#486050" };
  if (pct <= 30) return { label: "Moderate",          color: "#7a6020" };
  if (pct <= 40) return { label: "Aggressive",        color: "#6a4028" };
  return                 { label: "Max Pressure",     color: "#5a2828" };
}

// Returns ALL matched formations with score, sorted — no slice
function scoreAll(flat) {
  if (!flat.length) return [];
  return Object.entries(FDB).map(([name, d]) => {
    const coreHits = d.coreTags.filter(t => flat.includes(t));
    const suppHits = d.suppTags.filter(t => flat.includes(t));
    const sc = coreHits.length * 2 + suppHits.length;
    return { name, sc, coreHits, suppHits, blitz: getBlitz(d, flat), ...d };
  }).filter(f => f.sc > 0).sort((a, b) => b.sc - a.sc);
}

// Group formations by personnel type for the "All Formations" browser
// Re-scores formations weighted toward a specific personnel tag
// so switching tabs re-ranks, not just re-filters
function scoreForPersonnel(personnelTag, allTraits) {
  if (!allTraits.length) return [];
  // Personnel-adjacent tags that co-occur with this package
  const personnelContext = {
    p10:  ["p10","p11","no_run","empty","trips","elite_wr","slot_threat","hurry_up","quick_game","screens","rpo"],
    p11:  ["p11","rpo","play_action","quick_game","outside_run","inside_run","elite_wr","slot_threat","trips","motion_heavy"],
    p12:  ["p12","p21","elite_te","inside_run","outside_run","play_action","seam_routes","run_heavy_1st","strong_oline"],
    p21:  ["p21","p22","fb_lead","inside_run","counter_trap","strong_oline","run_heavy_1st","short_yardage_run"],
    p22:  ["p22","p21","strong_oline","inside_run","run_heavy_1st","fb_lead","four_down_go","short_yardage_run"],
    trips:["trips","p10","p11","elite_wr","slot_threat","motion_heavy","rpo","quick_game","flat_attack"],
    empty:["empty","p10","pass_heavy_3rd","qb_pocket","no_run","hurry_up","west_coast","quick_game"],
  };
  const ctx = personnelContext[personnelTag] || [personnelTag];
  return Object.entries(FDB).map(([name, d]) => {
    const coreHits = d.coreTags.filter(t => allTraits.includes(t));
    const suppHits = d.suppTags.filter(t => allTraits.includes(t));
    // Base score from full trait set
    let sc = coreHits.length * 2 + suppHits.length;
    // Bonus: how well does this formation specifically handle this personnel context
    const personnelBonus = ctx.filter(t => d.coreTags.includes(t)).length * 3
                         + ctx.filter(t => d.suppTags.includes(t)).length * 1;
    // Must have at least one match on the personnel tag itself or context
    const personnelMatch = d.coreTags.includes(personnelTag) || d.suppTags.includes(personnelTag)
                        || ctx.some(t => d.coreTags.includes(t));
    if (!personnelMatch) return null;
    return { name, sc: sc + personnelBonus, coreHits, suppHits, blitz: getBlitz(d, allTraits), ...d };
  }).filter(Boolean).sort((a, b) => b.sc - a.sc);
}

function groupByPersonnel(scored) {
  const order = ["Prevent","Goal Line","Heavy","Base","Nickel","Dime"];
  const groups = {};
  for (const f of scored) {
    const key = f.personnel || "Base";
    if (!groups[key]) groups[key] = [];
    groups[key].push(f);
  }
  return order.filter(k => groups[k]).map(k => ({ label: k, formations: groups[k] }));
}

                <span style={{ fontSize: 11, color: "#708090" }}>{c.label}</span>
                <span style={{ fontSize: 11, fontWeight: "bold", color: "#907020", background: "#111009", border: "1px solid #3a2800", padding: "2px 8px", borderRadius: 5, flexShrink: 0, fontFamily: "'IBM Plex Mono', monospace" }}>{c.value}</span>
              </div>
            ))}
          </div>
        )}

        {tab === "callsheet" && (
          <div>
            <div style={{ fontSize: "12px", color: "#6a7d90", letterSpacing: "2px", textTransform: "uppercase", marginBottom: 18, fontFamily: "'IBM Plex Mono', monospace" }}>Down & Distance Quick Reference</div>

              <div key={i} style={{ display: "grid", gridTemplateColumns: "95px 1fr", background: i % 2 === 0 ? "#080c15" : "#060910", border: "1px solid #1e2a3a", borderRadius: 4, marginBottom: 4, overflow: "hidden" }}>

                  <div style={{ fontSize: 15, fontWeight: "700", color: "#c8d0da", fontFamily: "'IBM Plex Mono', monospace" }}>{c.call}</div>

                </div>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

function getAvailableFamilies(flat) {
  const has = (tag) => flat.includes(tag);
  const fams = [];

  // ── 10 Personnel ──────────────────────────────────────────────
  if (has("p10")) {
    fams.push("p10_gun");
    if (has("trips")) fams.push("p10_trips");
    if (has("empty")) fams.push("p10_empty");
  }

  // ── 11 Personnel — show if explicitly tagged OR if spread tendencies exist ──
  const has11 = has("p11") || has("rpo") || has("outside_run") || has("quick_game") || has("play_action") || has("elite_wr");
  if (has11) {
    // Pistol: run-based spread teams
    if (has("rpo") || has("option_run") || has("outside_run") || has("inside_run") || has("hb_stretch"))
      fams.push("p11_pistol");
    // Gun: standard spread
    fams.push("p11_gun");
    // Trips: if they bunch/trips
    if (has("trips") || has("motion_heavy")) fams.push("p11_trips");
    // Empty: if they go empty
    if (has("empty")) fams.push("p11_empty");
    // Motion: if motion is heavy
    if (has("motion_heavy") && !fams.includes("p11_trips")) fams.push("p11_motion");
  }

  // ── 12 Personnel ──────────────────────────────────────────────
  if (has("p12") || has("elite_te") || has("seam_routes")) {
    fams.push("p12_gun");
    if (has("outside_run") || has("inside_run") || has("run_heavy_1st") || has("hb_stretch"))
      fams.push("p12_pistol");
    if (has("strong_oline") || has("fb_lead") || has("run_heavy_1st") || has("p21"))
      fams.push("p12_under");
    if (has("trips") || has("motion_heavy")) fams.push("p12_trips");
  }

  // ── 21 Personnel ──────────────────────────────────────────────
  if (has("p21") || has("fb_lead")) {
    if (has("fb_lead") || has("strong_oline") || has("run_heavy_1st") || has("inside_run"))
      fams.push("p21_iForm");
    if (has("outside_run") || has("hb_stretch") || has("inside_run"))
      fams.push("p21_pistol");
    if (has("play_action") || has("west_coast") || has("seam_routes"))
      fams.push("p21_gun");
    if (has("option_run") || has("dual_threat") || has("mobile_qb"))
      fams.push("p21_option");
  }

  // ── 22 Personnel ──────────────────────────────────────────────
  if (has("p22") || has("strong_oline") && (has("run_heavy_1st") || has("short_yardage_run"))) {
    fams.push("p22_iForm");
    if (has("outside_run") || has("inside_run") || has("counter_trap"))
      fams.push("p22_pistol");
    if (has("option_run") || has("dual_threat") || has("mobile_qb"))
      fams.push("p22_wildcat");
  }

  // ── Trips / Empty standalone (when not already covered under 11p) ──────────
  if (has("trips") && !has11) {
    fams.push("trips_gun");
    if (has("motion_heavy")) fams.push("trips_motion");
  }
  if (has("empty") && !has("p10") && !has11) {
    fams.push("empty_gun");
    if (has("trips")) fams.push("empty_trips");
  }

  // Always guarantee at least one family shows if any personnel tagged ─────────
  if (fams.length === 0) {
    if (has("p11")) fams.push("p11_gun");
    else if (has("p12")) fams.push("p12_gun");
    else if (has("p21")) fams.push("p21_iForm");
    else if (has("p22")) fams.push("p22_iForm");
    else fams.push("p11_gun"); // fallback
  }

  return [...new Set(fams)];
}

function scoreForFamily(familyId, allTraits) {
  const family = PERSONNEL_FAMILIES[familyId];
  if (!family) return scoreForPersonnel("p11", allTraits);
  const adj = FAMILY_ADJUSTMENTS[familyId];
  const biasNames = adj ? adj.bias : [];
  const baseResults = scoreForPersonnel(family.base, allTraits);
  const biased = baseResults.filter(f => biasNames.includes(f.name));
  const rest   = baseResults.filter(f => !biasNames.includes(f.name));
  return [...biased, ...rest];
}

              {shareToast === "shared" ? "✓ Sent" : shareToast === "copied" ? "✓ Copied" : "⬆ Share"}
            </button>
            <button onClick={() => { setStep("pick"); setTeam(null); setScored([]); setSelFm(null); }} style={{ background:"transparent", border:`1px solid ${S.border}`, borderRadius:6, padding:"5px 10px", color:S.text2, fontSize:11, fontFamily:S.mono, cursor:"pointer", whiteSpace:"nowrap" }}>← Teams</button>
          </div>
        </div>
        <div style={{ fontSize:11, color:S.text3, lineHeight:1.55, fontStyle:"italic", borderTop:`1px solid ${S.border}`, paddingTop:8 }}>
          {team.notes}
        </div>
        <div style={{ display:"flex", gap:6, marginTop:10 }}>
          {[{id:"personnel",l:"📋 By Personnel"},{id:"all",l:`🏟️ All ${scored.length}`}].map(t => (
            <button key={t.id} onClick={() => setMainTab(t.id)} style={{ padding:"6px 13px", background:mainTab===t.id ? S.gold : "transparent", border:`1px solid ${mainTab===t.id ? S.gold : S.border}`, borderRadius:7, color:mainTab===t.id ? "#0a0e16" : S.text2, fontSize:11, fontWeight:mainTab===t.id ? 700 : 400, fontFamily:S.mono, cursor:"pointer" }}>
              {t.l}
            </button>
          ))}
        </div>
      </div>

      <div style={{ padding:"14px 14px 20px" }}>
        {mainTab === "personnel" && (
          <div>
            <div style={{ fontSize:10, color:S.text3, letterSpacing:"2px", textTransform:"uppercase", fontFamily:S.mono, marginBottom:10 }}>Formation + Personnel</div>
            <div style={{ display:"flex", flexWrap:"wrap", gap:7, marginBottom:14 }}>
              {getAvailableFamilies(flat).map(fid => {
                const fam = PERSONNEL_FAMILIES[fid];
                return fam ? (
                  <button key={fid} onClick={() => { setActiveP(fid); setSelFm(null); }}
                    style={{ padding:"7px 12px", background:activeP===fid ? S.gold : "transparent", border:`1px solid ${activeP===fid ? S.gold : S.border}`, borderRadius:7, color:activeP===fid ? "#0a0e16" : S.text2, fontSize:11, fontWeight:activeP===fid ? 700 : 400, fontFamily:S.mono, cursor:"pointer" }}>
                    {fam.label}
                  </button>
                ) : null;
              })}
            </div>
            {activeP && (PERSONNEL_FAMILIES[activeP] || PMAP[activeP]) && (() => {
              const fam = PERSONNEL_FAMILIES[activeP];
              const pd  = fam ? PMAP[fam.base] : PMAP[activeP];
              const adj = FAMILY_ADJUSTMENTS[activeP];
              const matches = fam ? scoreForFamily(activeP, flat).slice(0, 8)
                                  : scoreForPersonnel(activeP, flat).slice(0, 8);
              return (
                <div>
                  <div style={{ background:S.card, border:`1px solid ${S.border}`, borderRadius:8, padding:"12px 14px", marginBottom:14 }}>
                    {fam && <div style={{ marginBottom:10, paddingBottom:10, borderBottom:`1px solid ${S.border}` }}>
                      <div style={{ fontSize:10, color:S.text3, letterSpacing:"2px", textTransform:"uppercase", fontFamily:S.mono, marginBottom:3 }}>Alignment</div>
                      <div style={{ fontSize:11, color:S.text2 }}>{fam.desc}</div>
                    </div>}
                    {adj && <div style={{ marginBottom:10, paddingBottom:10, borderBottom:`1px solid ${S.border}` }}>
                      <div style={{ fontSize:10, color:S.goldDim, letterSpacing:"2px", textTransform:"uppercase", fontFamily:S.mono, marginBottom:5 }}>Alignment DC Rule</div>
                      <div style={{ fontSize:11, color:S.text1, lineHeight:1.65, marginBottom:8 }}>{adj.extra}</div>
                      <div style={{ display:"flex", flexWrap:"wrap", gap:5 }}>
                        {adj.bias && adj.bias.map(b => <span key={b} style={{ fontSize:10, padding:"2px 8px", border:`1px solid ${S.gold}44`, borderRadius:5, color:S.gold, fontFamily:S.mono }}>{b}</span>)}
                      </div>
                    </div>}
                    {pd && <div>
                      <div style={{ fontSize:10, color:S.goldDim, letterSpacing:"2px", textTransform:"uppercase", fontFamily:S.mono, marginBottom:5 }}>DC Priority</div>
                      <div style={{ fontSize:11, color:S.text1, lineHeight:1.65, marginBottom:12 }}>{pd.priority}</div>
                      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}>
                        <div style={{ background:"#160808", border:"1px solid #4a2020", borderRadius:6, padding:"9px 11px" }}>
                          <div style={{ fontSize:10, color:"#7a4040", letterSpacing:"1px", textTransform:"uppercase", fontFamily:S.mono, marginBottom:4 }}>⚠ Avoid</div>
                          <div style={{ fontSize:11, color:"#8a6060", lineHeight:1.6 }}>{pd.avoid}</div>
                        </div>
                        <div style={{ background:"#0a1410", border:"1px solid #1e3828", borderRadius:6, padding:"9px 11px" }}>
                          <div style={{ fontSize:10, color:"#3a6048", letterSpacing:"1px", textTransform:"uppercase", fontFamily:S.mono, marginBottom:4 }}>Blitz Guide</div>
                          <div style={{ fontSize:11, color:"#507060", lineHeight:1.6 }}>{pd.blitzNote}</div>
                        </div>
                      </div>
                    </div>}
                  </div>
                  <div style={{ fontSize:10, color:S.text3, letterSpacing:"2px", textTransform:"uppercase", fontFamily:S.mono, marginBottom:10 }}>{matches.length} formations matched</div>
                  {matches.map(fm => (
                    <div key={fm.name}>
                      <FormationCard fm={fm} flat={flat} onSelect={f => setSelFm(selFm && selFm.name === f.name ? null : f)} isSelected={selFm && selFm.name === fm.name} />
                      {selFm && selFm.name === fm.name && <FormationDetail fm={fm} flat={flat} />}
                    </div>
                  ))}
                </div>
              );
            })()}
          </div>
        )}
        {mainTab === "all" && (
          <div>
            <div style={{ background:"#0a1410", border:"1px solid #1e3828", borderLeft:"3px solid #3a6048", borderRadius:8, padding:"10px 13px", marginBottom:14, fontSize:11, color:"#507060", lineHeight:1.6 }}>
              All {scored.length} formations matched vs {team.name}'s offensive identity. Gold pills = core match. Blue pills = supporting. Tap any card to expand.
            </div>
            {grouped.map(group => (
              <div key={group.label} style={{ marginBottom:18 }}>
                <div style={{ fontSize:10, letterSpacing:"2px", color:S.goldDim, textTransform:"uppercase", fontFamily:S.mono, marginBottom:10, display:"flex", alignItems:"center", gap:8 }}>
                  <span>{group.label}</span>
                  <span style={{ background:"#1e1a08", border:`1px solid ${S.goldDim}`, borderRadius:8, padding:"1px 7px", fontSize:9, color:S.goldDim }}>{group.formations.length}</span>
                </div>
                {group.formations.map(fm => (
                  <div key={fm.name}>
                    <FormationCard fm={fm} flat={flat} onSelect={f => setSelFm(selFm && selFm.name === f.name ? null : f)} isSelected={selFm && selFm.name === fm.name} />
                    {selFm && selFm.name === fm.name && <FormationDetail fm={fm} flat={flat} />}
                  </div>
                ))}
              </div>
            ))}
          </div>
        )}
        <div style={{ background:"#0a1410", border:"1px solid #1e3828", borderLeft:"3px solid #3a6048", borderRadius:8, padding:"11px 13px", marginTop:8 }}>
          <div style={{ fontWeight:700, color:"#507060", fontSize:11, marginBottom:4, fontFamily:S.mono }}>In-Game DC Adjustment</div>
          <div style={{ fontSize:11, color:"#3a5a48", lineHeight:1.65 }}>Match his personnel first. Then identify the window he's attacking — flat, seam, hash, middle, or deep. Switch to the highest-rated formation for that specific window.</div>
        </div>
        <div style={{ textAlign:"center", padding:"16px 0 4px", fontSize:9, color:S.text3, fontFamily:S.mono }}>CFB26 DC SCHEME BUILDER · {TEAMS.length} TEAMS</div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(TeamSchemeBuilder, null));

  </script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        const swCode = `
const CACHE='cfb26-teams-v1';
const CDNS=['https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js','https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js','https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js'];
self.addEventListener('install',e=>{e.waitUntil(caches.open(CACHE).then(c=>c.addAll(CDNS).catch(()=>{})));self.skipWaiting();});
self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(keys=>Promise.all(keys.filter(k=>k!==CACHE).map(k=>caches.delete(k)))));self.clients.claim();});
self.addEventListener('fetch',e=>{e.respondWith((async()=>{const cached=await caches.match(e.request);if(cached)return cached;try{const res=await fetch(e.request);if(res&&res.status===200){const cache=await caches.open(CACHE);const url=e.request.url;if(url.includes('cdnjs')||url.endsWith('.html')||url.endsWith('/')||url.includes('netlify'))cache.put(e.request,res.clone());}return res;}catch(err){const fb=await caches.match(e.request);if(fb)return fb;return new Response('Offline',{status:503});}})());});
        `;
        const blob = new Blob([swCode],{type:'application/javascript'});
        const swUrl = URL.createObjectURL(blob);
        navigator.serviceWorker.register(swUrl).then(reg => {
          navigator.serviceWorker.ready.then(async () => {
            try {
              const cache = await caches.open('cfb26-teams-v1');
              const res = await fetch(window.location.href);
              if (res && res.status === 200) await cache.put(window.location.href, res);
              for (const url of ['https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js','https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js','https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js']) {
                const c = await cache.match(url);
                if (!c) { const r = await fetch(url); if (r&&r.status===200) cache.put(url,r.clone()); }
              }
            } catch(e) {}
          });
        }).catch(()=>{});
      });
    }
  </script>
